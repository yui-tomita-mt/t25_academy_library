<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common :: meta_header('書籍登録',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/add.css}" />
    <!-- <script type="text/javascript" th:src="@{/js/book/add.js}"></script> -->
</head>

<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contens">
                <div class="page_title">書籍編集</div>
                <div class="page_contents">
                    <p class="required-note">＊は必須項目です</p>
                    <form id="book_edit_form" th:object="${bookMstDto}" th:action="@{/book/edit/{id}(id=${book.id})}"
                        method="post">
                        <input type="hidden" th:name="id" th:value="${book.id}" />
                    </form>
                    ut type="hidden" th:name="id" th:value="${book.id}" />
                    <div class="mb30 flexarea">
                        <span>
                            <a th:href="@{/book/index}" class="link">← 一覧へ戻る</a>
                        </span>
                    </div>
                    <div>
                        <div class="form_row">
                            <label for="title">書籍名*:</label><br>
                            <input class="form_input" type="text" id="title" name="title" th:field="*{title}"><br>
                        </div>
                        <div class="error_msg" th:if="${errTitle}">
                            <p th:text="${errTitle}" style="color: red;"></p>
                        </div>
                    </div>
                    <div class="form_row">
                        <label for="isbn">ISBN*:</label><br>
                        <input class="form_input" type="text" id="isbn" name="isbn" th:field="*{isbn}"><br>
                    </div>
                    <div class="error_msg" th:if="${errIsbn}">
                        <p th:text="${errIsbn}" style="color: red;"></p>
                    </div>
                </div>
            </div>
            <div class="button_area">
                <input id="submit_btn" type="submit" value="変更">
            </div>
            </form>
        </div>
    </div>
    </div>
    </div>
    <div th:replace="~{common :: footer}"></div>
</body>
<div id="flash-message" th:if="${errorMessage}" th:attr="data-message=${errorMessage}"></div>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const msg = document.getElementById("flash-message")?.dataset.message;
        if (msg) {
            alert(msg);
        }
    });
</script>

</html>
