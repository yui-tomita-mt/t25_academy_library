<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common :: meta_header('書籍登録',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/edit.css}" />
    <!-- <script type="text/javascript" th:src="@{/js/book/edit.js}"></script> -->
    <link rel="stylesheet" th:href="@{/css/book/add.css}" />
</head>

<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contens">
                <div class="page_title">書籍編集</div>
                <div class="page_contents">
                    <form id="book_register_form" th:action="@{/book/edit/{id}(id=*{id})}" method="post">
                        <input type="hidden" th:name="id" th:value="${book.id}" />

                        <p class="required-note">＊は必須項目です</p>
                        <div class="mb30 flexarea">
                            <span>
                                <a th:href="@{/book/index}" class="link">← 一覧へ戻る</a>
                            </span>
                        </div>

                        <div class="form-group">
                            <label for="title">書籍名*:</label><br>
                            <input type="text" id="title" class="form_input" th:name="title" th:value="${book.title}" />
                            <div class="error_msg" th:if="${errTitle}">
                                <p th:text="${errTitle}" style="color: red;"></p>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="isbn">ISBN*:</label><br>
                            <input type="text" id="isbn" class="form_input" th:name="isbn" th:value="${book.isbn}" />
                            <div class="error_msg" th:if="${isbnErrorlist}">
                                <p th:each="error : ${isbnErrorlist}" th:text="${error}" style="color: red;"></p>
                            </div>

                        </div>

                        <div class="btn_block">
                            <button id="submit_btn" type="submit">変更</button>
                        </div>
                        <div id="flash-message" th:if="${errorMessage}" th:attr="data-message=${errorMessage}"></div>
                        <script>
                            document.addEventListener("DOMContentLoaded", function () {
                                const msg = document.getElementById("flash-message")?.dataset.message;
                                if (msg) {
                                    alert(msg);
                                }
                            });
                        </script>

</html>
</form>
