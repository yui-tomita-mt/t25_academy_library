<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common :: meta_header('書籍一覧',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/index.css}" />
    <!-- <script type="text/javascript" th:src="@{/js/book/index.js}"></script> -->
</head>

<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contens">
                <div class="page_title">書籍一覧</div>
                <!-- ここから追記 -->
                <!-- 書籍登録用のボタン（クリックされたら登録画面へ遷移） -->
                <div class="button_area">
                    <button class="add-button" onclick="location.href='./add'">
                        <img th:src="@{/images/icons/add.png}" alt="アイコン" />
                        書籍登録
                    </button>
                </div>
                <!-- 登録情報の全件表示用テーブル -->
                <table class="books_table">
                    <thead>
                        <tr>
                            <th>書籍名</th>
                            <th>ISBN</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- DBの情報を取得し"book"に格納し件数分ループを回す -->
                        <tr th:each="book : ${bookMstList}">

                            <!-- "book"内のタイトルを順番に取り出し表示 -->
                            <td><a th:href="@{/book/edit/{id}(id=${book.id})}">
                                    <img class="edit_icon" th:src="@{/images/icons/edit.png}"></a>
                                <a href="javascript:void(0);"
                                    th:attr="data-id=${book.id}, data-title=${book.title}, data-isbn=${book.isbn}"
                                    onclick="confirmDelete(this)">
                                    <img th:src="@{/images/icons/trash.png}" alt="削除"
                                        style="width:20px; height:20px; margin-left:4px;" />
                                </a>
                                <div th:text="${book.title}"></div>
                            </td>
                            <!-- "book"内のISBNを順番に取り出し表示 -->
                            <td th:text="${book.isbn}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
</body>

<script>
    function confirmDelete(element) {
        const id = element.dataset.id;
        const title = element.dataset.title;
        const isbn = element.dataset.isbn;

        const message = `以下の書籍を削除しますか？\n\nタイトル: ${title}\nISBN: ${isbn}`;
        if (confirm(message)) {
            // [OK]がクリックされた場合、削除処理を実行
            window.location.href = `delete/${id}`;
        }
        // [キャンセル]がクリックされた場合、何も処理を行わない
    }
</script>
<div id="flash-message"
     th:if="${errorMessage != null or deleteMessage != null}"
     th:attr="data-message=${errorMessage != null ? errorMessage : deleteMessage}">
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const flashElement = document.getElementById("flash-message");
        const msg = flashElement?.dataset.message;
        if (msg) {
            alert(msg);
        }
    });
</script>


</html>
