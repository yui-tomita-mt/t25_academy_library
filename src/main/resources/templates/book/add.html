<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common :: meta_header('書籍登録',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/add.css}" />
    <script type="text/javascript" th:src="@{/js/book/add.js}"></script>
</head>

<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contens">
                <div class="page_title">書籍登録</div>
                <div class="page_contents">
                    <p class="required-note">＊は必須項目です</p>
                    <form id="book_register_form" th:object="${bookMstDto}" th:action="@{/book/add}" method="post">
                        <div class="mb30 flexarea">
                            <span>
                                <a th:href="@{/book/index}" class="link">← 一覧へ戻る</a>
                            </span>
                        </div>
                        <div>
                            <div class="form_row">
                            <label for="title">書籍名*:</label><br>
                            <input class="form_input" type="text" id="title" name="title" th:field="*{title}" placeholder="書籍名を入力"><br>
                            </div>
                            <div class="error_msg" th:if="${errTitle}">
                                <p th:text="${errTitle}" style="color: red;"></p>
                            </div>
                        </div>
                        <div class="form_row">
                            <label for="isbn">ISBN*:</label><br>
                            <input class="form_input" type="text" id="isbn" name="isbn" th:field="*{isbn}" placeholder="ISBNを入力"><br>
                        </div>
                        <div class="error_msg" th:if="${errorisbnlist != null}">
                            <ul>
                                <li th:each="err : ${errorisbnlist}" th:text="${err}"></li>
                            </ul>
                        </div>
                    </div>
                    <div class="error_msg" th:if="${errisbn != null}">
                        <p th:text="${errisbn}"></p>
                    </div>
                        </div>
                    <div class="button_area">
                        <input id="submit_btn" type="submit" value="保存">
                    </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{common :: footer}"></div>
</body>
